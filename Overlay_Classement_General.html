  /* ===== VUE COMBINÉE (podium + reste) ===== */
  #combo{position:absolute;inset:0;display:flex;flex-direction:column;gap:18px;min-height:0;}

  #combo-podium{display:flex;align-items:flex-end;justify-content:center;gap:26px;flex-shrink:0;}

  #combo .pod-crown{font-size:32px;margin-bottom:-2px;}

  #combo .pod1 .pod-av-e{font-size:50px;} #combo .pod2 .pod-av-e,#combo .pod3 .pod-av-e{font-size:40px;}
  #combo .pod1 .pod-name{font-size:32px;} #combo .pod2 .pod-name,#combo .pod3 .pod-name{font-size:26px;}
  #combo .pod-team{font-size:13px;} #combo .pod-teamlogo{height:calc(var(--sz-logo) * 0.65);max-width:calc(var(--sz-logo) * 1.47);}

  .tcard{display:flex;align-items:center;height:calc(var(--card-h) + 8px);border-radius:5px;overflow:hidden;position:relative;opacity:0;transform:translateX(-34px);transition:opacity .42s cubic-bezier(.22,1,.36,1),transform .42s cubic-bezier(.22,1,.36,1);}
  .tcard.vis{opacity:1;transform:translateX(0);}
  .tcard-bg{position:absolute;inset:0;background:rgba(18,18,18,.9);z-index:0;}
  .tcard.tr1 .tcard-bg{background:rgba(34,24,4,.92);}

  .tcard.tr3 .tcard-bg{background:rgba(24,16,8,.92);}
  .tpos{width:52px;height:100%;display:flex;align-items:center;justify-content:center;font-family:var(--font-pos);font-size:var(--sz-pos);background:rgba(0,0,0,.45);flex-shrink:0;position:relative;z-index:1;color:var(--c-pos-txt);}
  .tcard.tr1 .tpos{background:var(--gold);color:#1a1400;}
  .tcard.tr2 .tpos{background:rgba(200,208,216,.22);color:var(--silver);}
  .tcard.tr3 .tpos{background:rgba(205,127,50,.20);color:var(--bronze);}
  .tbar{width:var(--bar-w);height:100%;background:var(--c-bar);flex-shrink:0;position:relative;z-index:1;}
  .tcard.tr1 .tbar{background:var(--gold);width:calc(var(--bar-w) + 1px);}
  .tcard.tr2 .tbar{background:var(--silver);}
  .tcard.tr3 .tbar{background:var(--bronze);}
  .tinfo{flex:1;display:flex;flex-direction:column;justify-content:center;gap:4px;padding:0 14px;min-width:0;position:relative;z-index:1;}
  .tname{font-family:var(--font-name);font-size:calc(var(--sz-name) + 2px);letter-spacing:2px;color:var(--c-name);line-height:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .tcard.tr1 .tname{font-size:calc(var(--sz-name) + 5px);}
  .tmembers{font-family:var(--font-team);font-size:var(--sz-team);letter-spacing:1px;color:var(--c-team);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .tptsblock{display:flex;flex-direction:column;align-items:flex-end;justify-content:center;padding:0 16px 0 8px;min-width:96px;flex-shrink:0;z-index:1;position:relative;}
  .tpts{font-family:var(--font-points);font-size:calc(var(--sz-points) + 2px);color:var(--c-points);white-space:nowrap;line-height:1;}
  .tcard.tr1 .tpts{color:var(--gold);}
  .tpts-lbl{font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--c-pts-label);margin-top:2px;}
  #footer{height:28px;display:flex;align-items:center;justify-content:space-between;margin-top:14px;opacity:0;transition:opacity .6s .3s;}
  #footer.vis{opacity:1;}
  #fline{flex:1;height:var(--fline-h);background:linear-gradient(90deg,var(--acc) 0%,rgba(217,4,41,.25) 40%,transparent 100%);}
  #flabel{font-family:var(--font-footer);font-size:var(--sz-footer);letter-spacing:3px;text-transform:uppercase;color:var(--c-footer);margin-left:18px;}
  #flabelr{font-family:var(--font-footer);font-size:var(--sz-footer);letter-spacing:2px;text-transform:uppercase;color:var(--c-footer);}

  #status-msg{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:rgba(255,255,255,.15);font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:4px;pointer-events:none;z-index:3;}
  #status-msg p{font-family:'Barlow Condensed',sans-serif;font-size:14px;letter-spacing:2px;font-weight:400;margin-top:10px;color:rgba(255,255,255,.1);}

  /* ── RÉVÉLATION (dernier → 1er) ── */
  #rev{position:absolute;inset:0;z-index:20;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;background:rgba(0,0,0,.6);opacity:0;pointer-events:none;transition:opacity .35s;}

<body>

<div id="bg-grad"></div>

<div id="ov">
  <div id="hdr">
    <div id="hdr-l">
      <div id="logo-wrap" class="hide"><img id="logo-img" src="" alt=""></div>
      <div class="hblock">
        <div id="ev-title">Championship</div>
        <div id="ev-meta"></div>
      </div>
    </div>
    <div id="hdr-r">
      <div id="subtitle-tag">Classement Général</div>
      <div id="ev-date"></div>
    </div>
  </div>

  <div id="body">
    <div id="standings">
      <div id="status-msg">EN ATTENTE DES DONNÉES<p>Ouvre l'éditeur et clique sur Envoyer vers l'overlay</p></div>
    </div>
    <div id="podium" class="off"></div>
    <div id="combo" class="off"></div>
    <div id="teams" class="off"></div>
    <div id="rev"><div id="rev-lbl">Position</div><div id="rev-num">P1</div><div id="rev-name"></div></div>
  </div>

  <div id="footer">
    <div id="fline"></div>
    <div id="flabel"></div>
    <div id="flabelr"></div>
  </div>
</div>

<div id="ctrl">
  <span id="ctrl-lbl">En attente…</span>
  <button onclick="setView('standings')">Classement</button>
  <button onclick="setView('podium')">Podium</button>
  <button onclick="setView('combo')">Combiné</button>
  <button class="sec" onclick="startAnim()">Rejouer</button>
</div>

<script>
const ABLY_KEY    = 'YWBqmQ.FeXoQA:-bYCNUhoWm9ZRzQ2yB82S_DGhRrTwsBY4NFvMIm3qLA';
const CHAN_MAIN   = 'classement-general-main';
const CHAN_ASSETS = 'classement-general-assets';
const CHAN_CTRL   = 'classement-general-control';

let cfg = null, assets = {};
let view = 'standings';          // 'standings' | 'podium' | 'combo'
let animSpeed = 1500;
let standAnim = 'reveal';        // 'cascade' | 'reveal' (classement)
let revDir = 'up';               // 'up' = dernière→1ère | 'down' = 1ère→dernière
let showPoints = true;
let podTimer = null, revTimer = null, revRunning = false;
const root = document.documentElement;

// ── ABLY ──
function initAbly() {
  const client = new Ably.Realtime({
    key: ABLY_KEY,
    transports: ['web_socket', 'xhr_streaming', 'xhr_polling'],
    disconnectedRetryTimeout: 3000,
  });
  const chMain   = client.channels.get(CHAN_MAIN);
  const chAssets = client.channels.get(CHAN_ASSETS);
  const chCtrl   = client.channels.get(CHAN_CTRL);
  window._chCtrl = chCtrl;

  client.connection.on('connected',  () => { log('Connecté'); requestState(); });
  client.connection.on('connecting', () => { log('Connexion…'); });
  client.connection.on('disconnected',()=> { log('Déconnecté'); });
  client.connection.on('failed',     () => { log('Échec'); });

  chMain.subscribe('config', msg => {
    log('Config reçue');
    diagDataReceived = true; clearTimeout(noDataTimer);
    try { if (window._chCtrl) window._chCtrl.publish('overlayAck', { source:'obs', ts:Date.now() }); } catch(e) {}
    cfg = msg.data;
    applyConfig(cfg);
    setTimeout(startAnim, 400);
  });

  chAssets.subscribe('assets', msg => {
    const data = msg.data || {};
    log('Asset: ' + (data.type || '?'));
    if      (data.type === 'bg')         { assets.bg = data.bg; assets.bgOpacity = data.bgOpacity; }
    else if (data.type === 'logo')       { assets.logo = data.logo; }
    else if (data.type === 'font')       { assets.cf = data.cf; assets.cfName = data.cfName; }
    else if (data.type === 'avatars')    { assets.avatarMap   = { ...(assets.avatarMap||{}),   ...data.avatarMap }; }
    else if (data.type === 'teamLogos')  { assets.teamLogoMap = { ...(assets.teamLogoMap||{}), ...data.teamLogoMap }; }
    else                                 { assets = { ...assets, ...data }; }
    if (cfg) applyAssets(data);
  });
}

// ── APPLY CONFIG ──
function applyConfig(c) {
  if (!c) return;
  const s = c.style || {}, t = c.texts || {}, ev = c.event || {}, an = c.anim || {};

  if (s.accent) root.style.setProperty('--acc', s.accent);
  if (s.bar)    root.style.setProperty('--c-bar', s.bar);
  else          root.style.setProperty('--c-bar', s.accent || '#D90429');
  if (s.barW)   root.style.setProperty('--bar-w', s.barW + 'px');
  if (s.flineH) root.style.setProperty('--fline-h', s.flineH + 'px');
  if (s.gold)   root.style.setProperty('--gold',   s.gold);
  if (s.silver) root.style.setProperty('--silver', s.silver);
  if (s.bronze) root.style.setProperty('--bronze', s.bronze);

  if (s.bg || s.grad1) {
    const c1  = s.grad1 || s.bg || '#0A0A0A';
    const c2  = s.grad2 || s.bg || '#111111';
    const c3  = s.grad3 || c1;
    const p1  = parseInt(s.grad1pos ?? 0);
    const p2  = parseInt(s.grad2pos ?? 50);
    const p3  = parseInt(s.grad3pos ?? 100);
    const n   = parseInt(s.gradCount || 3);
    const dir = s.gradDir || '135deg';
    const halo = parseInt(s.halo || 7) / 100;
    const acc  = s.accent || '#D90429';
    if (s.bgStyle === 'solid' || n === 1) {
      document.getElementById('bg-grad').style.background = c1;
    } else {
      const stops = n === 2
        ? `${c1} ${p1}%, ${c2} ${p3}%`
        : `${c1} ${p1}%, ${c2} ${p2}%, ${c3} ${p3}%`;
      document.getElementById('bg-grad').style.background =
        `radial-gradient(ellipse at 18% 45%, ${acc}${Math.round(halo*255).toString(16).padStart(2,'0')} 0%, transparent 55%),` +
        `linear-gradient(${dir}, ${stops})`;
    }
  }

  const fonts = c.fonts || {};
  const fmap = {
    '--font-title':    fonts.title    || "'Bebas Neue',sans-serif",
    '--font-subtitle': fonts.subtitle || "'Bebas Neue',sans-serif",
    '--font-meta':     fonts.meta     || "'Barlow Condensed',sans-serif",
    '--font-pos':      fonts.pos      || "'Bebas Neue',sans-serif",
    '--font-name':     fonts.name     || "'Bebas Neue',sans-serif",
    '--font-team':     fonts.team     || "'Barlow Condensed',sans-serif",
    '--font-points':   fonts.points   || "'Bebas Neue',sans-serif",
    '--font-footer':   fonts.footer   || "'Barlow Condensed',sans-serif",
  };
  Object.entries(fmap).forEach(([k,v]) => root.style.setProperty(k, v));

  const sz = c.sizes || {};
  const smap = {
    '--sz-title':(sz.title||50)+'px', '--sz-subtitle':(sz.subtitle||27)+'px',
    '--sz-meta':(sz.meta||19)+'px', '--sz-date':(sz.date||15)+'px',
    '--sz-pos':(sz.pos||30)+'px', '--sz-name':(sz.name||28)+'px',
    '--sz-team':(sz.team||13)+'px', '--sz-points':(sz.points||30)+'px',
    '--sz-footer':(sz.footer||13)+'px',
    '--sz-av':(sz.av||52)+'px',
    '--card-h':((sz.av||52)+12)+'px',
    '--sz-pod-av':(sz.podAv||182)+'px',
    '--sz-logo':(sz.logo||34)+'px',
  };
  Object.entries(smap).forEach(([k,v]) => root.style.setProperty(k, v));

  const cl = c.colors2 || {};
  const cmap = {
    '--c-title':cl.title||'#ffffff', '--c-subtitle':cl.subtitle||'#ffffff',
    '--c-meta':cl.meta||'rgba(255,255,255,.5)', '--c-date':cl.date||'rgba(255,255,255,.38)',
    '--c-pos-txt':cl.posTxt||'rgba(255,255,255,.85)', '--c-pos-bg':cl.posBg||'rgba(0,0,0,.45)',
    '--c-name':cl.name||'#ffffff', '--c-team':cl.team||'rgba(255,255,255,.45)',
    '--c-points':cl.points||'#ffffff', '--c-pts-label':cl.ptsLabel||'rgba(255,255,255,.3)',
    '--c-footer':cl.footer||'rgba(255,255,255,.22)',
    '--c-card-bg':cl.cardBg||'rgba(18,18,18,.9)', '--c-card-bg-p1':cl.cardBgP1||'rgba(34,24,4,.92)',
    '--c-bar':cl.bar||(s.bar||s.accent||'#D90429'),
  };
  Object.entries(cmap).forEach(([k,v]) => root.style.setProperty(k, v));

  // Textes
  document.getElementById('ev-title').textContent     = t.title  || 'Championship';
  document.getElementById('subtitle-tag').textContent = t.sub    || 'Classement Général';
  document.getElementById('ev-date').textContent      = ev.date  || '';
  document.getElementById('flabel').textContent       = t.fl     || '';
  document.getElementById('flabelr').textContent      = t.fr     || '';
  const meta = [ev.season, ev.round].filter(Boolean).join(' · ');
  document.getElementById('ev-meta').textContent = t.slogan ? meta + '  ·  ' + t.slogan : meta;

  // Réglages affichage
  view       = (c.display && c.display.view) || 'standings';
  standAnim  = (c.display && c.display.anim) || 'reveal';
  animSpeed  = parseInt(an.speed) || 1500;
  showPoints = !(c.display && c.display.showPoints === '0');
  revDir     = (c.display && c.display.revDir) || 'up';
  document.getElementById('rev-lbl').textContent = (t.revLabel || 'Position');

  buildStandings(c.pilots || [], c);
  buildPodium(c.pilots || [], c);
  buildCombo(c.pilots || [], c);
  buildTeams(c.pilots || [], c);
  setView(view, true);

  // En-tête et pied toujours visibles dès qu'on a des données (l'animation d'entrée se rejoue via startAnim)
  document.getElementById('hdr').classList.add('vis');
  document.getElementById('footer').classList.add('vis');

  // Logo & fond
  const cA = c.assets || {};
  const logoSrc = cA.logo || assets.logo || null;
  setLogo(logoSrc);
  const bgSrc = cA.bg || assets.bg || null;
  if (bgSrc) applyAssets({ type:'bg', bg:bgSrc, bgOpacity:(cA.bg ? (c.style&&c.style.bgOpacity) : assets.bgOpacity) });

  if (assets) {
    if (assets.cf)   applyAssets({ type:'font', cf:assets.cf, cfName:assets.cfName });
    if (assets.avatarMap)   setTimeout(() => applyAssets({ type:'avatars',   avatarMap:assets.avatarMap }), 50);
    if (assets.teamLogoMap) setTimeout(() => applyAssets({ type:'teamLogos', teamLogoMap:assets.teamLogoMap }), 60);
  }
}

function setLogo(src) {
  const wrap = document.getElementById('logo-wrap');
  const img  = document.getElementById('logo-img');
  if (!wrap || !img) return;
  if (src) { img.src = src; wrap.classList.remove('hide'); }
  else      { wrap.classList.add('hide'); }
}
window.setLogo = setLogo;

// ── APPLY ASSETS ──
function applyAssets(a) {
  if (!a) return;
  const s = cfg?.style || {};
  const type = a.type;

  if (type === 'avatars') {
    const map = a.avatarMap || {};
    Object.entries(map).forEach(([id, src]) => {
      if (!src) return;
      // cartes classement
      document.querySelectorAll('.card').forEach(card => {
        if (card.dataset.pilotId !== String(id)) return;
        const ph = card.querySelector('.cav-e');
        if (ph) { const img=document.createElement('img'); img.className='cav'; img.src=src; ph.replaceWith(img); }
        else { const ex=card.querySelector('.cav'); if (ex) ex.src=src; }
      });
      // podium
      document.querySelectorAll('.pod').forEach(pod => {
        if (pod.dataset.pilotId !== String(id)) return;
        const ph = pod.querySelector('.pod-av-e');
        if (ph) { const img=document.createElement('img'); img.className='pod-av'; img.src=src; ph.replaceWith(img); }
        else { const ex=pod.querySelector('.pod-av'); if (ex) ex.src=src; }
      });
    });
    return;
  }

  if (type === 'teamLogos') {
    const map = a.teamLogoMap || {};
    Object.entries(map).forEach(([id, src]) => {
      if (!src) return;
      document.querySelectorAll('.card').forEach(card => {
        if (card.dataset.pilotId !== String(id)) return;
        const slot = card.querySelector('.clogo-e');
        if (slot) { const img=document.createElement('img'); img.className='clogo'; img.src=src; slot.replaceWith(img); }
        else { const ex=card.querySelector('.clogo'); if (ex) ex.src=src; }
      });
      document.querySelectorAll('.pod').forEach(pod => {
        if (pod.dataset.pilotId !== String(id)) return;
        let line = pod.querySelector('.pod-teamline');
        let img = pod.querySelector('.pod-teamlogo');
        if (line && !img) { img=document.createElement('img'); img.className='pod-teamlogo'; img.src=src; line.insertBefore(img, line.firstChild); }
        else if (img) { img.src=src; }
      });
    });
    return;
  }

  if (!type || type === 'bg') {
    const bgSrc = a.bg || null;
    const old = document.getElementById('bg-img-tag'); if (old) old.remove();
    if (bgSrc) {
      const op = parseFloat(a.bgOpacity !== undefined ? a.bgOpacity : (s.bgOpacity || 20)) / 100;
      const img = document.createElement('img');
      img.id = 'bg-img-tag'; img.src = bgSrc;
      img.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center;z-index:1;pointer-events:none;opacity:' + op;
      // Insérer après #bg-grad (z-index 1), avant #ov (z-index 2)
      const bgGrad = document.getElementById('bg-grad');
      if (bgGrad && bgGrad.nextSibling) {
        bgGrad.parentNode.insertBefore(img, bgGrad.nextSibling);
      } else {
        document.body.appendChild(img);
      }
    }
  }

  if (!type || type === 'logo') {
    setLogo(a.logo || null);
  }

  if (!type || type === 'font') {
    if (a.cf && a.cfName && !document.getElementById('custom-font-style')) {
      const st=document.createElement('style'); st.id='custom-font-style';
      st.textContent=`@font-face{font-family:'${a.cfName}';src:url('${a.cf}');}`;
      document.head.appendChild(st);
    }
  }
}

// ── BUILD: ÉQUIPES ──
function buildTeams(pilots, c) {
  const host = document.getElementById('teams');
  host.innerHTML = '';
  const active = pilots.filter(p => p.name || p.points);
  const ptsLabel = (c.texts && c.texts.ptsLabel) || 'PTS';
  if (!active.length) {
    host.innerHTML = '<div id="status-msg">AUCUN PILOTE<p>Ajoute des pilotes dans l\'éditeur</p></div>';
    return;
  }
  // Regrouper par nom d'équipe
  const map = {};
  active.forEach(p => {
    const team = (p.team || '').trim() || '— Sans équipe —';
    if (!map[team]) map[team] = { name: team, pts: 0, members: [] };
    const pts = parseFloat(String(p.points).replace(',','.')) || 0;
    map[team].pts += pts;
    map[team].members.push(p.name || '?');
  });
  const teams = Object.values(map).sort((a,b) => b.pts - a.pts);
  if (!teams.length) { host.innerHTML = '<div id="status-msg">AUCUNE ÉQUIPE</div>'; return; }
  // Affichage en 1 ou 2 colonnes
  const nCols = teams.length > 6 ? 2 : 1;
  if (nCols === 1) {
    const col = document.createElement('div'); col.className='scol';
    teams.forEach((t,i) => col.appendChild(mkTCard(t, i+1, ptsLabel)));
    host.appendChild(col);
  } else {
    const half = Math.ceil(teams.length / 2);
    const colL = document.createElement('div'); colL.className='scol';
    const colR = document.createElement('div'); colR.className='scol';
    const sep  = document.createElement('div'); sep.className='scol-sep';
    teams.forEach((t,i) => (i < half ? colL : colR).appendChild(mkTCard(t, i+1, ptsLabel)));
    host.appendChild(colL); host.appendChild(sep); host.appendChild(colR);
  }
}

function mkTCard(t, pos, ptsLabel) {
  const card = document.createElement('div');
  card.className = 'tcard' + (pos===1?' tr1':pos===2?' tr2':pos===3?' tr3':'');
  card.dataset.pos = pos;
  card.innerHTML =
    `<div class="tcard-bg"></div>` +
    `<div class="tpos">${pos}</div>` +
    `<div class="tbar"></div>` +
    `<div class="tinfo">` +
      `<div class="tname">${esc(t.name)}</div>` +
      `<div class="tmembers">${t.members.map(esc).join(' · ')}</div>` +
    `</div>` +
    (showPoints ? `<div class="tptsblock"><div class="tpts">${t.pts % 1 === 0 ? t.pts : t.pts.toFixed(1)}</div><div class="tpts-lbl">${esc(ptsLabel)}</div></div>` : '');
  return card;
}

function startTeamsAnim() {
  const cards = Array.from(document.querySelectorAll('#teams .tcard'));
  cards.forEach(c => c.classList.remove('vis'));
  if (standAnim === 'reveal') {
    const sorted = cards.slice().sort((a,b) => revDir === 'down'
      ? parseInt(a.dataset.pos) - parseInt(b.dataset.pos)
      : parseInt(b.dataset.pos) - parseInt(a.dataset.pos));
    runReveal(sorted.map(el => ({ el, pos: el.dataset.pos, name: el.querySelector('.tname')?.textContent || '' })));
  } else {
    cards.forEach((c,i) => setTimeout(() => c.classList.add('vis'), 70 + i * 60));
  }
}

// ── BUILD: CLASSEMENT (2 colonnes continues) ──
function buildStandings(pilots, c) {
  const host = document.getElementById('standings');
  host.innerHTML = '';
  const active = pilots.filter(p => p.name || p.points);
  if (!active.length) {
    host.innerHTML = '<div id="status-msg">AUCUN PILOTE<p>Ajoute des pilotes dans l\'éditeur</p></div>';
    return;
  }
  const ptsLabel = (c.texts && c.texts.ptsLabel) || 'PTS';
  // Colonnes : auto (1 si ≤9, sinon 2)
  let cols = (c.display && c.display.cols) || 'auto';
  let nCols = cols === '1' ? 1 : cols === '2' ? 2 : (active.length <= 9 ? 1 : 2);

  if (nCols === 1) {
    const col = document.createElement('div'); col.className='scol';
    active.forEach((p,i) => col.appendChild(mkCard(p, i+1, ptsLabel)));
    host.appendChild(col);
  } else {
    const half = Math.ceil(active.length / 2);
    const colL = document.createElement('div'); colL.className='scol';
    const colR = document.createElement('div'); colR.className='scol';
    active.forEach((p,i) => (i < half ? colL : colR).appendChild(mkCard(p, i+1, ptsLabel)));
    host.appendChild(colL);
    const sep = document.createElement('div'); sep.className='scol-sep'; host.appendChild(sep);
    host.appendChild(colR);
  }
}

function mkCard(p, pos, ptsLabel) {
  const card = document.createElement('div');
  card.className = 'card' + (pos===1?' r1':pos===2?' r2':pos===3?' r3':'');
  card.dataset.pos = pos;
  card.dataset.pilotId = String(p.id);
  card.innerHTML =
    `<div class="card-bg"></div>` +
    `<div class="cpos">${pos}</div>` +
    `<div class="cbar"></div>` +
    (p.avatar ? `<img class="cav" src="${p.avatar}" alt="">` : `<div class="cav-e">👤</div>`) +
    `<div class="cinfo">` +
      `<div class="cname">${esc(p.name) || '—'}</div>` +
      (p.team ? `<div class="cteam">${esc(p.team)}</div>` : '') +
    `</div>` +
    (p.teamLogo ? `<img class="clogo" src="${p.teamLogo}" alt="">` : `<div class="clogo-e"></div>`) +
    (showPoints
      ? `<div class="cptsblock"><div class="cpts">${esc(p.points) || '0'}</div><div class="cpts-lbl">${esc(ptsLabel)}</div></div>`
      : '');
  return card;
}

// ── BUILD: PODIUM (top 3) ──
function buildPodium(pilots, c) {
  const host = document.getElementById('podium');
  host.innerHTML = '';
  const active = pilots.filter(p => p.name || p.points);
  const ptsLabel = (c.texts && c.texts.ptsLabel) || 'PTS';
  const top = active.slice(0, 3);
  if (top.length < 1) {
    host.innerHTML = '<div id="status-msg">PODIUM INDISPONIBLE<p>Renseigne au moins le top 1</p></div>';
    return;
  }
  // Ordre visuel : 2e (gauche) · 1er (centre) · 3e (droite)
  const order = [];
  if (top[1]) order.push({ p:top[1], pos:2 });
  order.push({ p:top[0], pos:1 });
  if (top[2]) order.push({ p:top[2], pos:3 });
  order.forEach(({p,pos}) => host.appendChild(mkPod(p, pos, ptsLabel)));
}

function mkPod(p, pos, ptsLabel) {
  const pod = document.createElement('div');
  pod.className = 'pod pod' + pos;
  pod.dataset.pos = pos;
  pod.dataset.pilotId = String(p.id);
  // Pas de style inline — les CSS vars --sz-pod-av gèrent la taille via CSS
  pod.innerHTML =
    `<div class="pod-top">` +
      (pos===1 ? `<div class="pod-crown">👑</div>` : '') +
      `<div class="pod-av-wrap">` +
        (p.avatar
          ? `<img class="pod-av" src="${p.avatar}" alt="">`
          : `<div class="pod-av-e">👤</div>`) +
      `</div>` +
      `<div class="pod-name">${esc(p.name) || '—'}</div>` +
      `<div class="pod-teamline">` +
        (p.teamLogo ? `<img class="pod-teamlogo" src="${p.teamLogo}" alt="">` : '') +
        (p.team ? `<div class="pod-team">${esc(p.team)}</div>` : '') +
      `</div>` +
      (showPoints ? `<div class="pod-pts">${esc(p.points)||'0'}<small>${esc(ptsLabel)}</small></div>` : '') +
    `</div>` +
    `<div class="pedestal"><div class="ped-num">${pos}</div><div class="ped-floor"></div></div>`;
  return pod;
}

// ── BUILD: COMBINÉ (podium + reste) ──
function buildCombo(pilots, c) {
  const host = document.getElementById('combo');
  host.innerHTML = '';
  const active = pilots.filter(p => p.name || p.points);
  const ptsLabel = (c.texts && c.texts.ptsLabel) || 'PTS';
  if (!active.length) {
    host.innerHTML = '<div id="status-msg">AUCUN PILOTE<p>Ajoute des pilotes dans l\'éditeur</p></div>';
    return;
  }
  // Podium compact (top 3)
  const podWrap = document.createElement('div'); podWrap.id = 'combo-podium';
  const top = active.slice(0, 3);
  const order = [];
  if (top[1]) order.push({ p:top[1], pos:2 });
  if (top[0]) order.push({ p:top[0], pos:1 });
  if (top[2]) order.push({ p:top[2], pos:3 });
  order.forEach(({p,pos}) => podWrap.appendChild(mkPod(p, pos, ptsLabel)));
  host.appendChild(podWrap);

  // Reste (positions 4+) en 2 colonnes
  const rest = active.slice(3);
  const restWrap = document.createElement('div'); restWrap.id = 'combo-rest';
  if (rest.length) {
    const half = Math.ceil(rest.length / 2);
    const colL = document.createElement('div'); colL.className='scol';
    const colR = document.createElement('div'); colR.className='scol';
    rest.forEach((p,i) => (i < half ? colL : colR).appendChild(mkCard(p, i+4, ptsLabel)));
    restWrap.appendChild(colL);
    if (rest.length > half) {
      const sep=document.createElement('div'); sep.className='scol-sep'; restWrap.appendChild(sep);
    }
    restWrap.appendChild(colR);
  }
  host.appendChild(restWrap);
}

// ── VUES & ANIMATIONS ──
function setView(v, silent) {
  view = v;
  clearTimeout(revTimer); revRunning = false;
  document.getElementById('rev').classList.remove('show');
  document.getElementById('standings').classList.toggle('off', v !== 'standings');
  document.getElementById('podium').classList.toggle('off', v !== 'podium');
  document.getElementById('combo').classList.toggle('off', v !== 'combo');
  document.getElementById('teams').classList.toggle('off', v !== 'teams');
  if (!silent) startAnim();
}

function startAnim() {
  clearTimeout(podTimer); clearTimeout(revTimer); revRunning = false;
  document.getElementById('rev').classList.remove('show');
  document.getElementById('hdr').classList.add('vis');
  document.getElementById('footer').classList.add('vis');
  if (view === 'podium')      startPodiumAnim();
  else if (view === 'combo')  startComboAnim();
  else if (view === 'teams')  startTeamsAnim();
  else if (standAnim === 'reveal') startStandingsReveal();
  else                        startStandingsAnim();
}

function startStandingsAnim() {
  const cards = document.querySelectorAll('#standings .card');
  cards.forEach(c => c.classList.remove('vis'));
  cards.forEach((c, i) => setTimeout(() => c.classList.add('vis'), 70 + i * 55));
}

// Révélation à suspense : du dernier au 1er, avec le gros numéro affiché
function startStandingsReveal() {
  const cards = Array.from(document.querySelectorAll('#standings .card'));
  if (!cards.length) { startStandingsAnim(); return; }
  cards.forEach(c => c.classList.remove('vis'));
  const sorted = cards.slice().sort((a,b) => revDir === 'down'
    ? parseInt(a.dataset.pos) - parseInt(b.dataset.pos)   // 1ère → dernière
    : parseInt(b.dataset.pos) - parseInt(a.dataset.pos));  // dernière → 1ère (défaut)
  const items = sorted.map(el => ({ el, pos: el.dataset.pos, name: el.querySelector('.cname')?.textContent || '' }));
  runReveal(items);
}

// Révélation séquentielle générique : affiche le gros numéro puis l'élément, dans l'ordre fourni
function runReveal(items) {
  if (revRunning) return;
  if (!items.length) return;
  revRunning = true;
  let idx = 0;
  const rev = document.getElementById('rev');
  const rn  = document.getElementById('rev-num');
  const rnm = document.getElementById('rev-name');
  function next() {
    if (idx >= items.length) { revRunning = false; rev.classList.remove('show'); return; }
    const it = items[idx];
    rev.classList.add('show');
    rn.textContent  = 'P' + it.pos;
    rnm.textContent = it.name;
    rn.style.transform  = 'scale(1.16)';
    rn.style.textShadow = '0 0 120px var(--acc),0 0 40px var(--acc)';
    setTimeout(() => { rn.style.transform='scale(1)'; rn.style.textShadow='0 0 80px var(--acc)'; }, 200);
    setTimeout(() => { rev.classList.remove('show'); it.el.classList.add('vis'); }, animSpeed * 0.6);
    idx++;
    revTimer = setTimeout(next, animSpeed);
  }
  setTimeout(next, 400);
}

function startPodiumAnim() {
  const pods = Array.from(document.querySelectorAll('#podium .pod'));
  pods.forEach(p => p.classList.remove('vis'));
  if (standAnim === 'reveal') {
    const order = revDir === 'down' ? [1,2,3] : [3,2,1];
    const seq = order.map(pos => pods.find(p => p.dataset.pos === String(pos))).filter(Boolean);
    runReveal(seq.map(el => ({ el, pos: el.dataset.pos, name: el.querySelector('.pod-name')?.textContent || '' })));
    return;
  }
  const byPos = pos => pods.find(p => p.dataset.pos === String(pos));
  const sequence = [3, 2, 1].map(byPos).filter(Boolean);
  sequence.forEach((pod, i) => setTimeout(() => pod.classList.add('vis'), 300 + i * (animSpeed * 0.55)));
}

function startComboAnim() {
  const pods  = Array.from(document.querySelectorAll('#combo .pod'));
  const cards = Array.from(document.querySelectorAll('#combo-rest .card'));
  pods.forEach(p => p.classList.remove('vis'));
  cards.forEach(c => c.classList.remove('vis'));

  if (standAnim === 'reveal') {
    const restAsc = cards.slice().sort((a,b) => parseInt(a.dataset.pos) - parseInt(b.dataset.pos));
    const rest = (revDir === 'down' ? restAsc : restAsc.slice().reverse())
      .map(el => ({ el, pos: el.dataset.pos, name: el.querySelector('.cname')?.textContent || '' }));
    const podOrder = revDir === 'down' ? [1,2,3] : [3,2,1];
    const podSeq = podOrder.map(pos => pods.find(p => p.dataset.pos === String(pos))).filter(Boolean)
      .map(el => ({ el, pos: el.dataset.pos, name: el.querySelector('.pod-name')?.textContent || '' }));
    // up : reste (dernier→P4) puis podium 3→2→1 ; down : podium 1→2→3 puis reste (P4→dernier)
    runReveal(revDir === 'down' ? [...podSeq, ...rest] : [...rest, ...podSeq]);
    return;
  }

  // Apparition rapide : podium d'abord puis le reste
  const byPos = pos => pods.find(p => p.dataset.pos === String(pos));
  const seq = [3, 2, 1].map(byPos).filter(Boolean);
  const step = animSpeed * 0.4;
  seq.forEach((pod, i) => setTimeout(() => pod.classList.add('vis'), 300 + i * step));
  const after = 300 + seq.length * step + 200;
  cards.forEach((c, i) => setTimeout(() => c.classList.add('vis'), after + i * 45));
}

// ── HELPERS ──
function esc(s){ return (s||'').toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function lighten(hex, amt){
  try{ let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
    r=Math.min(255,r+amt);g=Math.min(255,g+amt);b=Math.min(255,b+amt);
    return '#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join(''); }catch{ return hex; }
}

// ── BroadcastChannel (aperçu même navigateur) ──
if (typeof BroadcastChannel !== 'undefined') {
  const bc = new BroadcastChannel('classement-general-bc');
  bc.onmessage = e => {
    if (e.data?.type === 'config') {
      diagDataReceived = true; clearTimeout(noDataTimer);
      cfg = e.data.cfg;
      assets = e.data.cfg?.assets || {};
      applyConfig(cfg);
      if (assets.logo || assets.bg) applyAssets(assets);
      setTimeout(startAnim, 300);
    }
  };
}

window.onload = () => { initAbly(); };
</script>
